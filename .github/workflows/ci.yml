name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Supply-chain gate. osv-scanner checks the committed pnpm-lock.yaml against
      # the OSV database and exits non-zero on a known vulnerability: an
      # endpoint-independent, maintained hard gate. Pinned to an exact version.
      - name: audit (osv-scanner)
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.8
        with:
          scan-args: |-
            --recursive
            ./

      - name: Type check
        run: pnpm check

      - name: Build
        run: pnpm build
